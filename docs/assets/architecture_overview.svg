<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" fill="none">
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="900" gradientUnits="userSpaceOnUse">
    <stop offset="0%" stop-color="#07111f"/>
    <stop offset="60%" stop-color="#0b1630"/>
    <stop offset="100%" stop-color="#0e1020"/>
  </linearGradient>
  <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#11213c" stop-opacity="0.92"/>
    <stop offset="100%" stop-color="#0a152b" stop-opacity="0.92"/>
  </linearGradient>
  <linearGradient id="accent1" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#68e1fd"/>
    <stop offset="100%" stop-color="#4f46e5"/>
  </linearGradient>
  <linearGradient id="accent2" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#7cf29a"/>
    <stop offset="100%" stop-color="#0ea5a5"/>
  </linearGradient>
  <linearGradient id="accent3" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#f0abfc"/>
    <stop offset="100%" stop-color="#8b5cf6"/>
  </linearGradient>
  <filter id="shadow" x="-20%" y="-20%" width="160%" height="160%">
    <feDropShadow dx="0" dy="12" stdDeviation="20" flood-color="#020617" flood-opacity="0.55"/>
  </filter>
  <filter id="glow1" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur stdDeviation="14" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <marker id="arrow" markerWidth="14" markerHeight="14" refX="10" refY="7" orient="auto">
    <path d="M0 0L14 7L0 14Z" fill="#74d9ff"/>
  </marker>
  <marker id="arrowGreen" markerWidth="14" markerHeight="14" refX="10" refY="7" orient="auto">
    <path d="M0 0L14 7L0 14Z" fill="#67e8b7"/>
  </marker>
  <marker id="arrowPurple" markerWidth="14" markerHeight="14" refX="10" refY="7" orient="auto">
    <path d="M0 0L14 7L0 14Z" fill="#c084fc"/>
  </marker>
</defs>

<style>
    .title { font: 700 34px 'Inter', 'Segoe UI', Arial, sans-serif; fill: #e6eef8; }
    .subtitle { font: 500 18px 'Inter', 'Segoe UI', Arial, sans-serif; fill: #9fb3c8; }
    .label { font: 600 18px 'Inter', 'Segoe UI', Arial, sans-serif; fill: #dfe8f3; }
    .body { font: 400 16px 'Inter', 'Segoe UI', Arial, sans-serif; fill: #b8c7d9; }
    .mono { font: 500 16px 'JetBrains Mono', 'Consolas', monospace; fill: #dff7ff; }
    .small { font: 400 13px 'Inter', 'Segoe UI', Arial, sans-serif; fill: #94a9bf; }
    .tiny { font: 500 12px 'Inter', 'Segoe UI', Arial, sans-serif; fill: #8aa0b7; letter-spacing: 0.08em; text-transform: uppercase; }
</style>

<rect width="1600" height="900" rx="28" fill="url(#bg)"/>

<g opacity="0.9">
  <circle cx="180" cy="150" r="120" fill="#0ea5e9" opacity="0.08"/>
  <circle cx="1340" cy="760" r="160" fill="#8b5cf6" opacity="0.10"/>
  <circle cx="1180" cy="190" r="120" fill="#10b981" opacity="0.08"/>
</g>
<text x="90" y="92" class="tiny">OpenMythos Visual Overview</text>
<text x="90" y="138" class="title">Recurrent-Depth Transformer pipeline</text>
<text x="90" y="176" class="subtitle">Prelude encodes once, the recurrent core iterates over latent state, and the coda decodes once.</text>

<g filter="url(#shadow)">
  <rect x="90" y="250" width="220" height="140" rx="26" fill="url(#panel)" stroke="#234160" stroke-width="2"/>
  <text x="125" y="303" class="tiny">Stage 0</text>
  <text x="125" y="338" class="label">Input IDs</text>
  <text x="125" y="368" class="body">Token sequence enters</text>
  <text x="125" y="392" class="body">the embedding stack.</text>

  <rect x="365" y="230" width="300" height="180" rx="28" fill="url(#panel)" stroke="#29527d" stroke-width="2"/>
  <rect x="390" y="255" width="250" height="54" rx="16" fill="url(#accent1)" opacity="0.18"/>
  <text x="402" y="288" class="tiny">Run once</text>
  <text x="402" y="334" class="label">Prelude</text>
  <text x="402" y="364" class="body">Standard transformer layers produce</text>
  <text x="402" y="388" class="body">encoded input <tspan class="mono">e</tspan> for the loop.</text>

  <rect x="760" y="190" width="430" height="420" rx="34" fill="url(#panel)" stroke="#2a6d70" stroke-width="2.3"/>
  <text x="792" y="238" class="tiny">Run T times</text>
  <text x="792" y="282" class="label">Recurrent block</text>
  <text x="792" y="316" class="body">Shared weights, variable-depth compute.</text>

  <rect x="812" y="350" width="326" height="72" rx="22" fill="url(#accent2)" opacity="0.16" stroke="#5eead4" stroke-opacity="0.3"/>
  <text x="842" y="393" class="label">Loop 1</text>

  <rect x="812" y="442" width="326" height="72" rx="22" fill="url(#accent2)" opacity="0.12" stroke="#5eead4" stroke-opacity="0.28"/>
  <text x="842" y="485" class="label">Loop 2</text>

  <rect x="812" y="534" width="326" height="72" rx="22" fill="url(#accent2)" opacity="0.10" stroke="#5eead4" stroke-opacity="0.25"/>
  <text x="842" y="577" class="label">Loop T</text>

  <text x="1160" y="395" class="body">Same block</text>
  <text x="1160" y="419" class="body">reused with</text>
  <text x="1160" y="443" class="body">updated state</text>
  <text x="1160" y="467" class="body"><tspan class="mono">h<tspan baseline-shift="sub" font-size="12">t</tspan></tspan></text>

  <rect x="1260" y="260" width="250" height="160" rx="28" fill="url(#panel)" stroke="#4b3f7f" stroke-width="2"/>
  <rect x="1284" y="284" width="202" height="48" rx="15" fill="url(#accent3)" opacity="0.18"/>
  <text x="1294" y="315" class="tiny">Run once</text>
  <text x="1294" y="362" class="label">Coda</text>
  <text x="1294" y="389" class="body">Final transformer layers</text>

  <rect x="1260" y="468" width="250" height="130" rx="28" fill="url(#panel)" stroke="#38506b" stroke-width="2"/>
  <text x="1294" y="518" class="tiny">Decode</text>
  <text x="1294" y="554" class="label">LM head</text>
  <text x="1294" y="580" class="body">Produces output logits.</text>
</g>

<path d="M312 320 C336 320, 342 320, 365 320" stroke="#74d9ff" stroke-width="5" marker-end="url(#arrow)"/>
<path d="M665 320 C710 320, 720 320, 760 320" stroke="#74d9ff" stroke-width="5" marker-end="url(#arrow)"/>
<path d="M1190 320 C1220 320, 1230 320, 1260 320" stroke="#c084fc" stroke-width="5" marker-end="url(#arrowPurple)"/>
<path d="M1385 420 C1385 440, 1385 448, 1385 468" stroke="#74d9ff" stroke-width="5" marker-end="url(#arrow)"/>

<path d="M975 422 C975 432, 975 432, 975 442" stroke="#67e8b7" stroke-width="5" marker-end="url(#arrowGreen)"/>
<path d="M975 514 C975 524, 975 524, 975 534" stroke="#67e8b7" stroke-width="5" marker-end="url(#arrowGreen)"/>
<path d="M804 570 C742 570, 742 366, 804 366" stroke="#67e8b7" stroke-width="4.5" stroke-dasharray="10 10" marker-end="url(#arrowGreen)"/>
<text x="690" y="470" class="small" transform="rotate(-90 690 470)">updated latent state</text>

<path d="M665 336 C730 366, 742 366, 804 366" stroke="#74d9ff" stroke-width="4" stroke-dasharray="8 10" marker-end="url(#arrow)"/>
<path d="M665 336 C730 458, 742 458, 804 458" stroke="#74d9ff" stroke-width="4" stroke-dasharray="8 10" marker-end="url(#arrow)"/>
<path d="M665 336 C730 550, 742 550, 804 550" stroke="#74d9ff" stroke-width="4" stroke-dasharray="8 10" marker-end="url(#arrow)"/>
<text x="535" y="508" class="small" transform="rotate(-64 535 508)">encoded input injected at every loop</text>

<rect x="90" y="694" width="1420" height="132" rx="26" fill="#0b1526" stroke="#22314a" stroke-width="1.5"/>
<text x="128" y="740" class="label">Core idea</text>
<text x="128" y="776" class="body">Depth comes from repeated computation through a shared recurrent block rather than from stacking a new set of parameters for every reasoning step.</text>

</svg>